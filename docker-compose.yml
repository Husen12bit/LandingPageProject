services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skillbantuin-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html             # ← root project langsung
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
    networks:
      - skillbantuin

  nginx:
    image: nginx:1.27-alpine
    container_name: skillbantuin-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html             # ← root project langsung
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - skillbantuin

  db:
    image: gvenzl/oracle-xe:21-slim
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: skillbantuin
      APP_USER_PASSWORD: "123"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - skillbantuin

volumes:
  oracle_data:

networks:
  skillbantuin:
    driver: bridge
